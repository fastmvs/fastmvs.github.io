<svg viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="210" fill="#111" rx="14"/>

  <!-- Speed lines (Fast) -->
  <line x1="8"  y1="88" x2="38" y2="88" stroke="#60a5fa" stroke-width="1.5" opacity="0.35"/>
  <line x1="12" y1="94" x2="32" y2="94" stroke="#60a5fa" stroke-width="1"   opacity="0.25"/>
  <line x1="8"  y1="100" x2="28" y2="100" stroke="#60a5fa" stroke-width="0.8" opacity="0.18"/>

  <!-- ── Isometric wireframe cube ── -->
  <!-- Top face -->
  <polygon points="100,60 132,78 100,96 68,78"
           fill="rgba(96,165,250,0.07)" stroke="#60a5fa" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- Left face (dimmer) -->
  <polygon points="68,78 100,96 100,130 68,112"
           fill="rgba(96,165,250,0.04)" stroke="#60a5fa" stroke-width="1.4" stroke-linejoin="round" opacity="0.75"/>
  <!-- Right face (brightest — lit) -->
  <polygon points="132,78 100,96 100,130 132,112"
           fill="rgba(255,255,255,0.04)" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round" opacity="0.6"/>

  <!-- Inner center cross-lines (depth cue) -->
  <line x1="100" y1="60"  x2="100" y2="96"  stroke="#60a5fa" stroke-width="0.7" opacity="0.3"/>
  <line x1="68"  y1="78"  x2="132" y2="78"  stroke="#60a5fa" stroke-width="0.7" opacity="0.3"/>

  <!-- ── Camera icons ── -->
  <!-- Camera 1: top-left -->
  <g transform="translate(16,18)">
    <rect x="0" y="3" width="20" height="13" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.4"/>
    <rect x="6" y="0" width="8"  height="4"  rx="1" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
    <circle cx="10" cy="9" r="3.2" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
    <circle cx="10" cy="9" r="1"   fill="#60a5fa"/>
  </g>

  <!-- Camera 2: top-right -->
  <g transform="translate(164,18)">
    <rect x="0" y="3" width="20" height="13" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.4"/>
    <rect x="6" y="0" width="8"  height="4"  rx="1" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
    <circle cx="10" cy="9" r="3.2" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
    <circle cx="10" cy="9" r="1"   fill="#60a5fa"/>
  </g>

  <!-- Camera 3: bottom-center -->
  <g transform="translate(90,158)">
    <rect x="0" y="3" width="20" height="13" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.4"/>
    <rect x="6" y="0" width="8"  height="4"  rx="1" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
    <circle cx="10" cy="9" r="3.2" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
    <circle cx="10" cy="9" r="1"   fill="#60a5fa"/>
  </g>

  <!-- ── Ray lines (dashed) from cameras to cube ── -->
  <!-- From cam1 (≈26,34) to cube top-left and top-top -->
  <line x1="34"  y1="33" x2="68"  y2="78" stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.45"/>
  <line x1="36"  y1="30" x2="100" y2="60" stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.35"/>

  <!-- From cam2 (≈174,34) to cube top-right and top-top -->
  <line x1="166" y1="33" x2="132" y2="78" stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.45"/>
  <line x1="164" y1="30" x2="100" y2="60" stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.35"/>

  <!-- From cam3 (≈100,161) to cube bottom corners -->
  <line x1="94"  y1="161" x2="68"  y2="112" stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.45"/>
  <line x1="106" y1="161" x2="132" y2="112" stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.45"/>

  <!-- ── Scattered point cloud dots ── -->
  <g fill="#60a5fa">
    <circle cx="86"  cy="72"  r="1.1" opacity="0.6"/>
    <circle cx="114" cy="69"  r="0.9" opacity="0.5"/>
    <circle cx="78"  cy="90"  r="1.2" opacity="0.55"/>
    <circle cx="122" cy="86"  r="1.0" opacity="0.6"/>
    <circle cx="92"  cy="108" r="1.1" opacity="0.5"/>
    <circle cx="110" cy="112" r="1.0" opacity="0.55"/>
    <circle cx="76"  cy="106" r="0.9" opacity="0.45"/>
    <circle cx="126" cy="100" r="1.1" opacity="0.5"/>
    <circle cx="100" cy="118" r="0.9" opacity="0.6"/>
    <circle cx="88"  cy="124" r="1.0" opacity="0.4"/>
    <circle cx="112" cy="122" r="0.8" opacity="0.45"/>
    <circle cx="104" cy="76"  r="0.9" opacity="0.5"/>
  </g>

  <!-- ── Logotype ── -->
  <text x="100" y="198"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="800"
        font-size="17"
        letter-spacing="1.5">
    <tspan fill="#ffffff">Fast</tspan><tspan fill="#60a5fa">MVS</tspan>
  </text>
</svg>
