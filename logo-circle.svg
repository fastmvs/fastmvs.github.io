<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle background -->
  <circle cx="100" cy="100" r="100" fill="#111"/>
  <!-- Clip to circle -->
  <defs>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circle-clip)">
    <!-- Speed lines -->
    <line x1="8"  y1="96"  x2="34" y2="96"  stroke="#60a5fa" stroke-width="1.5" opacity="0.45"/>
    <line x1="12" y1="102" x2="28" y2="102" stroke="#60a5fa" stroke-width="1.0" opacity="0.30"/>
    <line x1="8"  y1="108" x2="24" y2="108" stroke="#60a5fa" stroke-width="0.8" opacity="0.22"/>

    <!-- Isometric cube (centered, slightly higher) -->
    <polygon points="100,54 136,74 100,94 64,74"
             fill="rgba(96,165,250,0.10)" stroke="#60a5fa" stroke-width="1.6" stroke-linejoin="round"/>
    <polygon points="64,74 100,94 100,130 64,110"
             fill="rgba(96,165,250,0.06)" stroke="#60a5fa" stroke-width="1.4" stroke-linejoin="round" opacity="0.8"/>
    <polygon points="136,74 100,94 100,130 136,110"
             fill="rgba(255,255,255,0.05)" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round" opacity="0.65"/>

    <!-- Depth lines -->
    <line x1="100" y1="54"  x2="100" y2="94"  stroke="#60a5fa" stroke-width="0.7" opacity="0.25"/>
    <line x1="64"  y1="74"  x2="136" y2="74"  stroke="#60a5fa" stroke-width="0.7" opacity="0.25"/>

    <!-- Cameras -->
    <g transform="translate(28,26)">
      <rect x="0" y="3" width="18" height="11" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.3"/>
      <rect x="5" y="0" width="8"  height="4"  rx="1" fill="none" stroke="#60a5fa" stroke-width="1.1"/>
      <circle cx="9" cy="8" r="2.8" fill="none" stroke="#60a5fa" stroke-width="1.1"/>
      <circle cx="9" cy="8" r="0.9" fill="#60a5fa"/>
    </g>
    <g transform="translate(154,26)">
      <rect x="0" y="3" width="18" height="11" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.3"/>
      <rect x="5" y="0" width="8"  height="4"  rx="1" fill="none" stroke="#60a5fa" stroke-width="1.1"/>
      <circle cx="9" cy="8" r="2.8" fill="none" stroke="#60a5fa" stroke-width="1.1"/>
      <circle cx="9" cy="8" r="0.9" fill="#60a5fa"/>
    </g>
    <g transform="translate(91,148)">
      <rect x="0" y="3" width="18" height="11" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.3"/>
      <rect x="5" y="0" width="8"  height="4"  rx="1" fill="none" stroke="#60a5fa" stroke-width="1.1"/>
      <circle cx="9" cy="8" r="2.8" fill="none" stroke="#60a5fa" stroke-width="1.1"/>
      <circle cx="9" cy="8" r="0.9" fill="#60a5fa"/>
    </g>

    <!-- Rays -->
    <line x1="45"  y1="35" x2="64"  y2="74"  stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.45"/>
    <line x1="47"  y1="32" x2="100" y2="54"  stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.35"/>
    <line x1="155" y1="35" x2="136" y2="74"  stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.45"/>
    <line x1="153" y1="32" x2="100" y2="54"  stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.35"/>
    <line x1="95"  y1="151" x2="64"  y2="110" stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.45"/>
    <line x1="107" y1="151" x2="136" y2="110" stroke="#60a5fa" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.45"/>

    <!-- Point cloud -->
    <g fill="#60a5fa">
      <circle cx="86"  cy="66"  r="1.1" opacity="0.7"/>
      <circle cx="114" cy="63"  r="0.9" opacity="0.6"/>
      <circle cx="76"  cy="84"  r="1.2" opacity="0.65"/>
      <circle cx="124" cy="82"  r="1.0" opacity="0.7"/>
      <circle cx="90"  cy="104" r="1.1" opacity="0.6"/>
      <circle cx="112" cy="108" r="1.0" opacity="0.65"/>
      <circle cx="74"  cy="102" r="0.9" opacity="0.55"/>
      <circle cx="128" cy="96"  r="1.1" opacity="0.6"/>
      <circle cx="100" cy="116" r="0.9" opacity="0.7"/>
      <circle cx="104" cy="70"  r="0.9" opacity="0.6"/>
    </g>
  </g>

  <!-- Logotype at bottom -->
  <text x="100" y="188"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="800" font-size="18" letter-spacing="1.5">
    <tspan fill="#ffffff">Fast</tspan><tspan fill="#60a5fa">MVS</tspan>
  </text>

  <!-- Circle border -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
</svg>
