<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cc-light">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>

  <!-- Light background -->
  <circle cx="100" cy="100" r="100" fill="#f0f4ff"/>

  <g clip-path="url(#cc-light)">

    <!-- Speed lines -->
    <line x1="10" y1="88"  x2="36" y2="88"  stroke="#2563eb" stroke-width="1.4" opacity="0.35"/>
    <line x1="10" y1="93"  x2="30" y2="93"  stroke="#2563eb" stroke-width="0.9" opacity="0.22"/>
    <line x1="10" y1="98"  x2="26" y2="98"  stroke="#2563eb" stroke-width="0.7" opacity="0.15"/>

    <!-- Cube top face -->
    <polygon points="105,56 138,75 105,94 72,75"
             fill="rgba(37,99,235,0.08)" stroke="#2563eb" stroke-width="1.6" stroke-linejoin="round"/>
    <!-- Left face -->
    <polygon points="72,75 105,94 105,130 72,111"
             fill="rgba(37,99,235,0.05)" stroke="#2563eb" stroke-width="1.4" stroke-linejoin="round" opacity="0.8"/>
    <!-- Right face (lit) -->
    <polygon points="138,75 105,94 105,130 138,111"
             fill="rgba(37,99,235,0.03)" stroke="#1e3a8a" stroke-width="1.4" stroke-linejoin="round" opacity="0.6"/>
    <!-- Depth guide lines -->
    <line x1="105" y1="56" x2="105" y2="94" stroke="#2563eb" stroke-width="0.6" opacity="0.2"/>
    <line x1="72"  y1="75" x2="138" y2="75" stroke="#2563eb" stroke-width="0.6" opacity="0.2"/>

    <!-- Point cloud -->
    <g fill="#2563eb">
      <circle cx="91"  cy="68"  r="1.1" opacity="0.6"/>
      <circle cx="118" cy="65"  r="0.8" opacity="0.5"/>
      <circle cx="82"  cy="83"  r="1.2" opacity="0.55"/>
      <circle cx="126" cy="84"  r="0.9" opacity="0.5"/>
      <circle cx="88"  cy="106" r="1.0" opacity="0.55"/>
      <circle cx="113" cy="112" r="0.9" opacity="0.5"/>
      <circle cx="78"  cy="100" r="0.8" opacity="0.45"/>
      <circle cx="130" cy="100" r="1.0" opacity="0.5"/>
      <circle cx="105" cy="120" r="0.9" opacity="0.55"/>
      <circle cx="96"  cy="77"  r="0.8" opacity="0.45"/>
    </g>

    <!-- Camera A: bottom-left, LARGE (near) -->
    <g transform="translate(22,128)">
      <rect x="0" y="4" width="24" height="15" rx="2.5" fill="none" stroke="#2563eb" stroke-width="1.6"/>
      <rect x="7" y="0" width="10" height="5"  rx="1.2" fill="none" stroke="#2563eb" stroke-width="1.4"/>
      <circle cx="12" cy="11" r="4.0" fill="none" stroke="#2563eb" stroke-width="1.4"/>
      <circle cx="12" cy="11" r="1.3" fill="#2563eb"/>
    </g>

    <!-- Camera B: top-center, MEDIUM -->
    <g transform="translate(76,18)">
      <rect x="0" y="3" width="18" height="12" rx="2" fill="none" stroke="#2563eb" stroke-width="1.3"/>
      <rect x="5" y="0" width="8"  height="4"  rx="1" fill="none" stroke="#2563eb" stroke-width="1.1"/>
      <circle cx="9" cy="9" r="3.0" fill="none" stroke="#2563eb" stroke-width="1.2"/>
      <circle cx="9" cy="9" r="1.0" fill="#2563eb"/>
    </g>

    <!-- Camera C: right side, SMALL (far) -->
    <g transform="translate(152,85)">
      <rect x="0" y="2" width="13" height="9"  rx="1.5" fill="none" stroke="#2563eb" stroke-width="1.0"/>
      <rect x="4" y="0" width="5"  height="3"  rx="0.8" fill="none" stroke="#2563eb" stroke-width="0.9"/>
      <circle cx="6" cy="6" r="2.0" fill="none" stroke="#2563eb" stroke-width="0.9"/>
      <circle cx="6" cy="6" r="0.7" fill="#2563eb"/>
    </g>

    <!-- Rays -->
    <line x1="44"  y1="135" x2="72"  y2="111" stroke="#2563eb" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.45"/>
    <line x1="40"  y1="132" x2="72"  y2="75"  stroke="#2563eb" stroke-width="0.9" stroke-dasharray="3,2.5" opacity="0.3"/>
    <line x1="85"  y1="30"  x2="72"  y2="75"  stroke="#2563eb" stroke-width="0.8" stroke-dasharray="3,2.5" opacity="0.4"/>
    <line x1="94"  y1="28"  x2="105" y2="56"  stroke="#2563eb" stroke-width="0.8" stroke-dasharray="3,2.5" opacity="0.4"/>
    <line x1="102" y1="30"  x2="138" y2="75"  stroke="#2563eb" stroke-width="0.8" stroke-dasharray="3,2.5" opacity="0.3"/>
    <line x1="153" y1="90"  x2="138" y2="75"  stroke="#2563eb" stroke-width="0.7" stroke-dasharray="3,2.5" opacity="0.35"/>
    <line x1="153" y1="93"  x2="138" y2="111" stroke="#2563eb" stroke-width="0.7" stroke-dasharray="3,2.5" opacity="0.35"/>

  </g>

  <!-- Logotype -->
  <text x="104" y="192"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="800" font-size="17" letter-spacing="1.5">
    <tspan fill="#111111">Fast</tspan><tspan fill="#2563eb">MVS</tspan>
  </text>

  <!-- Circle border -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#2563eb" stroke-width="0.8" opacity="0.2"/>
</svg>
