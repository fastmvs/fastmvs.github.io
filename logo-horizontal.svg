<svg viewBox="0 0 300 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Horizontal: icon left + text right, dark bg optimized -->

  <!-- Icon group (scaled down, centered at 30,30) -->
  <g transform="translate(5,5)">
    <!-- Cube -->
    <polygon points="25,8 37,15 25,22 13,15"
             fill="rgba(96,165,250,0.10)" stroke="#60a5fa" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="13,15 25,22 25,36 13,29"
             fill="rgba(96,165,250,0.06)" stroke="#60a5fa" stroke-width="1.1" stroke-linejoin="round" opacity="0.8"/>
    <polygon points="37,15 25,22 25,36 37,29"
             fill="rgba(255,255,255,0.04)" stroke="#ffffff" stroke-width="1.1" stroke-linejoin="round" opacity="0.6"/>
    <!-- Small cameras -->
    <rect x="3"  y="2"  width="10" height="7" rx="1.2" fill="none" stroke="#60a5fa" stroke-width="1.0"/>
    <circle cx="8"  cy="5.5" r="1.8" fill="none" stroke="#60a5fa" stroke-width="0.9"/>
    <circle cx="8"  cy="5.5" r="0.6" fill="#60a5fa"/>
    <rect x="37" y="2"  width="10" height="7" rx="1.2" fill="none" stroke="#60a5fa" stroke-width="1.0"/>
    <circle cx="42" cy="5.5" r="1.8" fill="none" stroke="#60a5fa" stroke-width="0.9"/>
    <circle cx="42" cy="5.5" r="0.6" fill="#60a5fa"/>
    <rect x="20" y="40" width="10" height="7" rx="1.2" fill="none" stroke="#60a5fa" stroke-width="1.0"/>
    <circle cx="25" cy="43.5" r="1.8" fill="none" stroke="#60a5fa" stroke-width="0.9"/>
    <circle cx="25" cy="43.5" r="0.6" fill="#60a5fa"/>
    <!-- Rays -->
    <line x1="11" y1="8"  x2="13" y2="15" stroke="#60a5fa" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.5"/>
    <line x1="39" y1="8"  x2="37" y2="15" stroke="#60a5fa" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.5"/>
    <line x1="22" y1="40" x2="13" y2="29" stroke="#60a5fa" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.5"/>
    <line x1="28" y1="40" x2="37" y2="29" stroke="#60a5fa" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.5"/>
    <!-- Point cloud -->
    <g fill="#60a5fa">
      <circle cx="21" cy="15" r="0.8" opacity="0.7"/>
      <circle cx="29" cy="13" r="0.7" opacity="0.6"/>
      <circle cx="18" cy="22" r="0.9" opacity="0.65"/>
      <circle cx="32" cy="21" r="0.7" opacity="0.7"/>
      <circle cx="23" cy="28" r="0.8" opacity="0.6"/>
      <circle cx="28" cy="30" r="0.7" opacity="0.65"/>
    </g>
    <!-- Speed lines -->
    <line x1="0" y1="22" x2="8" y2="22" stroke="#60a5fa" stroke-width="1.2" opacity="0.35"/>
    <line x1="0" y1="25" x2="6" y2="25" stroke="#60a5fa" stroke-width="0.8" opacity="0.22"/>
  </g>

  <!-- Divider -->
  <line x1="62" y1="12" x2="62" y2="48" stroke="#374151" stroke-width="1"/>

  <!-- Text -->
  <text x="74" y="38"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="800" font-size="26" letter-spacing="1">
    <tspan fill="#ffffff">Fast</tspan><tspan fill="#60a5fa">MVS</tspan>
  </text>
</svg>
